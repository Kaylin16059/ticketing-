<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — MKM Projects</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy)">
  <div style="width:100%;max-width:400px;padding:16px">
    <div style="text-align:center;margin-bottom:28px">
      <h1 style="font-size:32px;font-weight:900;letter-spacing:-0.5px">
        <span class="mkm-m1">M</span><span class="mkm-k">K</span><span class="mkm-m2">M</span>
        <span style="color:#fff"> Projects</span>
      </h1>
    </div>
    <div class="panel" style="margin:0">
      <h2 style="margin-bottom:20px;font-size:18px">Sign in to your account</h2>
      {% if error %}
      <div class="flash flash-danger" style="margin-bottom:16px">{{ error }}</div>
      {% endif %}
      <form method="POST" class="stack-form form-lg">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" autocomplete="username" autofocus required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" autocomplete="current-password" required>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
          <input type="checkbox" name="remember" id="remember" style="width:16px;height:16px;accent-color:var(--cyan)">
          <label for="remember" style="font-size:13px;text-transform:none;letter-spacing:0;font-weight:400;margin:0;color:var(--text-mid)">Keep me signed in</label>
        </div>
        <button type="submit" style="width:100%;justify-content:center;margin-top:8px;padding:13px">Sign In</button>
      </form>
    </div>
    <p style="text-align:center;font-size:12px;color:rgba(255,255,255,0.4);margin-top:20px">
      Default credentials: admin / admin123 — change after first login.
    </p>
  </div>
</body>
</html>
